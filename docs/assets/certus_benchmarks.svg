<svg xmlns="http://www.w3.org/2000/svg" width="680" height="520" viewBox="0 0 680 520" role="img">
<title>Certus benchmark results: SPDK NVMe vs filesystem</title>
<desc>Latency and throughput comparison across populate, hot lookup, and cold lookup operations. SPDK NVMe is 41x faster on populate, 2.4x on hot lookup, 4.4x on cold lookup.</desc>

<style>
  text { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
</style>

<!-- Background -->
<rect width="680" height="520" fill="#ffffff" rx="0"/>

<!-- ── Metric cards ── -->
<!-- Card 1: Populate -->
<rect x="20" y="20" width="198" height="72" rx="8" fill="#f1efe8"/>
<text x="119" y="46" text-anchor="middle" font-size="11" fill="#5f5e5a">Populate speedup</text>
<text x="119" y="73" text-anchor="middle" font-size="28" font-weight="500" fill="#1a1a18">41×</text>
<text x="119" y="88" text-anchor="middle" font-size="10" fill="#888780">487 µs vs 20,090 µs</text>

<!-- Card 2: Hot lookup -->
<rect x="241" y="20" width="198" height="72" rx="8" fill="#f1efe8"/>
<text x="340" y="46" text-anchor="middle" font-size="11" fill="#5f5e5a">Hot lookup speedup</text>
<text x="340" y="73" text-anchor="middle" font-size="28" font-weight="500" fill="#1a1a18">2.4×</text>
<text x="340" y="88" text-anchor="middle" font-size="10" fill="#888780">466 µs vs 1,136 µs</text>

<!-- Card 3: Cold lookup -->
<rect x="462" y="20" width="198" height="72" rx="8" fill="#f1efe8"/>
<text x="561" y="46" text-anchor="middle" font-size="11" fill="#5f5e5a">Cold lookup speedup</text>
<text x="561" y="73" text-anchor="middle" font-size="28" font-weight="500" fill="#1a1a18">4.4×</text>
<text x="561" y="88" text-anchor="middle" font-size="10" fill="#888780">2,238 µs vs 9,878 µs</text>

<!-- ── Legend ── -->
<rect x="20" y="110" width="10" height="10" rx="2" fill="#1D9E75"/>
<text x="35" y="120" font-size="11" fill="#5f5e5a">certus-server (SPDK NVMe)</text>
<rect x="230" y="110" width="10" height="10" rx="2" fill="#B4B2A9" stroke="#888780" stroke-width="1"/>
<text x="245" y="120" font-size="11" fill="#5f5e5a">generalized-fs (filesystem)</text>

<!-- ══════════════════════════════════
     LATENCY CHART  (log scale visual)
     Chart area: x=120..650, y=138..268
     Labels: x=20..115
     3 rows, each 40px tall, 10px gap
     Row centres: 158, 198, 238  (but we'll
     draw two bars per row, ±9px from centre)
     
     Data (µs): Populate 487/20090, Hot 466/1136, Cold 2238/9878
     Log10 max = log10(20090) ≈ 4.303
     Chart width = 530px
     px_per_log = 530/4.303 ≈ 123.2
     
     Bar widths (px):
       487   → log10(487)=2.687  → 331
       20090 → log10(20090)=4.303→ 530
       466   → log10(466)=2.668  → 329
       1136  → log10(1136)=3.055 → 376
       2238  → log10(2238)=3.350 → 413
       9878  → log10(9878)=3.995 → 492
     
     Bars start at x=120
════════════════════════════════════ -->

<!-- Section label -->
<text x="20" y="138" font-size="11" font-weight="500" fill="#73726c">Latency per object (µs) — lower is better  [log scale]</text>

<!-- Grid lines at x=120+123*n for n=1,2,3,4 -->
<line x1="243" y1="145" x2="243" y2="270" stroke="#e8e6de" stroke-width="0.5"/>
<line x1="366" y1="145" x2="366" y2="270" stroke="#e8e6de" stroke-width="0.5"/>
<line x1="489" y1="145" x2="489" y2="270" stroke="#e8e6de" stroke-width="0.5"/>
<line x1="612" y1="145" x2="612" y2="270" stroke="#e8e6de" stroke-width="0.5"/>
<!-- Grid labels -->
<text x="243" y="278" text-anchor="middle" font-size="9" fill="#888780">100</text>
<text x="366" y="278" text-anchor="middle" font-size="9" fill="#888780">1k</text>
<text x="489" y="278" text-anchor="middle" font-size="9" fill="#888780">10k</text>

<!-- Row 1: Populate -->
<text x="115" y="164" text-anchor="end" font-size="11" fill="#444441">Populate</text>
<!-- SPDK bar -->
<rect x="120" y="149" width="331" height="14" rx="2" fill="#1D9E75"/>
<text x="456" y="161" font-size="10" fill="#1D9E75">487 µs</text>
<!-- FS bar -->
<rect x="120" y="166" width="530" height="14" rx="2" fill="#B4B2A9"/>
<text x="655" y="178" font-size="10" fill="#888780">20,090</text>

<!-- Row 2: Hot lookup -->
<text x="115" y="204" text-anchor="end" font-size="11" fill="#444441">Hot lookup</text>
<!-- SPDK bar -->
<rect x="120" y="189" width="329" height="14" rx="2" fill="#1D9E75"/>
<text x="454" y="201" font-size="10" fill="#1D9E75">466 µs</text>
<!-- FS bar -->
<rect x="120" y="206" width="376" height="14" rx="2" fill="#B4B2A9"/>
<text x="501" y="218" font-size="10" fill="#888780">1,136</text>

<!-- Row 3: Cold lookup -->
<text x="115" y="244" text-anchor="end" font-size="11" fill="#444441">Cold lookup</text>
<!-- SPDK bar -->
<rect x="120" y="229" width="413" height="14" rx="2" fill="#1D9E75"/>
<text x="538" y="241" font-size="10" fill="#1D9E75">2,238 µs</text>
<!-- FS bar -->
<rect x="120" y="246" width="492" height="14" rx="2" fill="#B4B2A9"/>
<text x="617" y="258" font-size="10" fill="#888780">9,878</text>

<!-- Axis baseline -->
<line x1="120" y1="145" x2="120" y2="268" stroke="#d3d1c7" stroke-width="1"/>

<!-- ══════════════════════════════════
     THROUGHPUT CHART (linear)
     Chart area: x=120..650, y=310..440
     Data (GB/s): Populate 8.6/0.21, Hot 9.0/3.7, Cold 1.9/0.42
     Max = 9.0 → 530px wide → 58.9px per GB/s
     
     Bar widths:
       8.6  → 507
       0.21 → 12
       9.0  → 530
       3.7  → 218
       1.9  → 112
       0.42 → 25
════════════════════════════════════ -->

<!-- Separator -->
<line x1="20" y1="292" x2="660" y2="292" stroke="#e8e6de" stroke-width="0.5"/>

<text x="20" y="312" font-size="11" font-weight="500" fill="#73726c">Throughput (GB/s) — higher is better</text>

<!-- Grid lines -->
<line x1="296" y1="319" x2="296" y2="444" stroke="#e8e6de" stroke-width="0.5"/>
<line x1="473" y1="319" x2="473" y2="444" stroke="#e8e6de" stroke-width="0.5"/>
<line x1="650" y1="319" x2="650" y2="444" stroke="#e8e6de" stroke-width="0.5"/>
<text x="296" y="452" text-anchor="middle" font-size="9" fill="#888780">3</text>
<text x="473" y="452" text-anchor="middle" font-size="9" fill="#888780">6</text>
<text x="650" y="452" text-anchor="middle" font-size="9" fill="#888780">9 GB/s</text>

<!-- Row 1: Populate -->
<text x="115" y="338" text-anchor="end" font-size="11" fill="#444441">Populate</text>
<rect x="120" y="323" width="507" height="14" rx="2" fill="#1D9E75"/>
<text x="632" y="335" font-size="10" fill="#1D9E75">8.6 GB/s</text>
<rect x="120" y="340" width="12" height="14" rx="2" fill="#B4B2A9"/>
<text x="137" y="352" font-size="10" fill="#888780">0.21</text>

<!-- Row 2: Hot lookup -->
<text x="115" y="378" text-anchor="end" font-size="11" fill="#444441">Hot lookup</text>
<rect x="120" y="363" width="530" height="14" rx="2" fill="#1D9E75"/>
<text x="655" y="375" font-size="10" fill="#1D9E75">9.0</text>
<rect x="120" y="380" width="218" height="14" rx="2" fill="#B4B2A9"/>
<text x="343" y="392" font-size="10" fill="#888780">3.7</text>

<!-- Row 3: Cold lookup -->
<text x="115" y="418" text-anchor="end" font-size="11" fill="#444441">Cold lookup</text>
<rect x="120" y="403" width="112" height="14" rx="2" fill="#1D9E75"/>
<text x="237" y="415" font-size="10" fill="#1D9E75">1.9</text>
<rect x="120" y="420" width="25" height="14" rx="2" fill="#B4B2A9"/>
<text x="150" y="432" font-size="10" fill="#888780">0.42</text>

<!-- Axis baseline -->
<line x1="120" y1="319" x2="120" y2="442" stroke="#d3d1c7" stroke-width="1"/>

<!-- Footer -->
<text x="660" y="500" text-anchor="end" font-size="10" fill="#888780">Total wall time: 11.2s (SPDK) vs 38.6s (filesystem) — 3.4× faster end-to-end</text>

</svg>