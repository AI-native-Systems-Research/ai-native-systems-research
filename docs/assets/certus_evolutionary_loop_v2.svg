<!-- ══ RETURN PATH: Stage 4 → Stage 1 (right side) ══
  Goes: bottom-right of Stage 4 → right at y=486 → up to y=96 → into right of Stage 1
  All bends are L-shaped, no text on the path.
  Stage 4 right edge: x=410, mid y=486
  Stage 1 right edge: x=410, mid y=96
  Return rail x=470 (clear of all boxes)
-->
<path d="M410 486 L470 486 L470 96 L411 96" fill="none" stroke="var(--s)" stroke-width="1" marker-end="url(#arr)" style="fill:none;stroke:rgb(61, 61, 58);color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- Return path label — placed in clear space at x=490, mid of the vertical run -->
<text x="510" y="295" text-anchor="start" dominant-baseline="central" style="fill:rgb(61, 61, 58);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:start;dominant-baseline:central">Accepted</text>
