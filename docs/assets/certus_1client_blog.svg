<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1185" font-family="Helvetica, Arial, sans-serif" role="img" aria-label="Certus single-client benchmark: throughput by phase across five storage backends">
<rect width="920" height="1185" fill="#EFEAE0"/>
<text x="64" y="54" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" letter-spacing="3" fill="#E8501F">CERTUS · BENCH NOTES · Nº 03</text>
<text x="856" y="54" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="12" letter-spacing="2" fill="#6E7287">SINGLE CLIENT / 4× NVME</text>
<text x="64" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="#1F2A52">Three fates of a <tspan font-style="italic" fill="#E8501F">4 MiB</tspan> cache object</text>
<text x="64" y="142" font-size="14.5" fill="#6E7287">Written once, read hot from memory, read cold from flash — one client, five storage backends, throughput in GB/s.</text>
<line x1="64" y1="168" x2="856" y2="168" stroke="#1F2A52" stroke-width="2.5"/>
<text x="264" y="192" text-anchor="end" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">GB/s</text>
<text x="280.0" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">0</text>
<text x="363.2" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">2</text>
<text x="446.4" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">4</text>
