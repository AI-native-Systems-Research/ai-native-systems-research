<text x="696.0" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">10</text>
<text x="779.2" y="192" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="11" fill="#6E7287">12</text>
<text x="58" y="272" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#E8501F" opacity="0.16" font-style="italic">01</text>
<text x="138" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#1F2A52">Populate</text>
<text x="138" y="268" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic" fill="#6E7287">— the write path</text>
<text x="856" y="238" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">Every backend lands at 11 ± 1 GB/s. A single client</text>
<text x="856" y="254" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">simply cannot saturate four NVMe devices with writes.</text>
