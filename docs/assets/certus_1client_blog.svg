<line x1="64" y1="766" x2="856" y2="766" stroke="#C9C2B2" stroke-width="1"/>
<text x="58" y="848" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#E8501F" opacity="0.16" font-style="italic">03</text>
<text x="138" y="824" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#1F2A52">Lookup · cold</text>
<text x="138" y="844" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic" fill="#6E7287">— back to the device</text>
<text x="856" y="814" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">The only phase that separates the field: a lone device</text>
<text x="856" y="830" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">tops out near 5 GB/s. Striping restores parallelism.</text>
