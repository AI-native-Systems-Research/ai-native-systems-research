<text x="58" y="560" font-family="Georgia, 'Times New Roman', serif" font-size="92" fill="#E8501F" opacity="0.16" font-style="italic">02</text>
<text x="138" y="536" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#1F2A52">Lookup · hot</text>
<text x="138" y="556" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-style="italic" fill="#6E7287">— served from memory</text>
<text x="856" y="526" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">A hit in the 4 GiB pool never touches storage —</text>
<text x="856" y="542" text-anchor="end" font-size="12.5" font-style="italic" fill="#6E7287">outlined bars mean the device never wakes.</text>
