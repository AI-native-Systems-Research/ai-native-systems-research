<text x="64" y="1076" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic" fill="#1F2A52">With one client the backend barely matters — until the cache goes <tspan fill="#E8501F">cold</tspan>.</text>
<line x1="64" y1="1129" x2="856" y2="1129" stroke="#1F2A52" stroke-width="2.5"/>
<text x="64" y="1151" font-family="'Courier New', Courier, monospace" font-size="10.5" fill="#6E7287">4 MiB blocks · 16 obj/batch · 10 iterations · 672 objects (160 cold) · 4 GiB pool</text>
